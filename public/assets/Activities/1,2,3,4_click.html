<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1,2,3,4_click</title>
    <link href="https://fonts.googleapis.com/css2?family=Risque&display=swap" rel="stylesheet">
    <style>
        /* Reset and eliminate all browser scrolls/margins to fully cover a 16:9 PC monitor */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Risque', serif;
            cursor: pointer;
            user-select: none;
        }

        /* Forces a strict responsive 16:9 widescreen canvas box */
        .canvas-16-9 {
            position: relative;
            width: 100%;
            height: 100%;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            border-radius: 24px;
            box-shadow: none;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px; /* Minimal padding for safety */
        }

        /* Banjo Mascot Container */
        .banjo-container {
            display: none !important;
            justify-content: center;
            align-items: center;
            width: 43.2vmin;
            height: 43.2vmin;
            max-width: 338px;
            max-height: 338px;
            min-width: 216px;
            min-height: 216px;
            margin-right: 6vmin; /* Spacer between mascot and wheel */
            position: relative;
            container-type: size;
            transition: transform 0.3s ease;
        }

        .banjo-character {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Vector Mascot Animations & States */
        .ear, .arm {
            transition: transform 0.15s cubic-bezier(0.25, 0.8, 0.25, 1.1);
        }

        /* Pose 1: Idle (Floppy ears down, arms resting at side) */
        .sprite-idle .left-ear { transform: rotate(0deg); transform-origin: 50px 70px; }
        .sprite-idle .right-ear { transform: rotate(0deg); transform-origin: 150px 70px; }
        .sprite-idle .left-arm { transform: rotate(0deg); transform-origin: 55px 140px; }
        .sprite-idle .right-arm { transform: rotate(0deg); transform-origin: 145px 140px; }

        /* Pose 2: Listening Ears (Ears perking upwards, arms listening) */
        .sprite-listening-ears .left-ear { transform: rotate(45deg); transform-origin: 50px 70px; }
        .sprite-listening-ears .right-ear { transform: rotate(-45deg); transform-origin: 150px 70px; }
        .sprite-listening-ears .left-arm { transform: rotate(-10deg); transform-origin: 55px 140px; }
        .sprite-listening-ears .right-arm { transform: rotate(10deg); transform-origin: 145px 140px; }

        /* Pose 3: Clapping Hands (Arms clap together in the center) */
        .sprite-clapping-hands .left-ear { transform: rotate(10deg); transform-origin: 50px 70px; }
        .sprite-clapping-hands .right-ear { transform: rotate(-10deg); transform-origin: 150px 70px; }
        .sprite-clapping-hands .left-arm { transform: translate(30px, -12px) rotate(-40deg); transform-origin: 55px 140px; }
        .sprite-clapping-hands .right-arm { transform: translate(-30px, -12px) rotate(40deg); transform-origin: 145px 140px; }

        /* Disney-style theatrical motion triggers */
        @keyframes anticipation {
            0% { transform: scale(1); }
            50% { transform: translateY(-6%) scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-anticipation {
            animation: anticipation 0.22s ease-out;
        }

        @keyframes strike-pop {
            0% { transform: scale(1); }
            30% { transform: scale(1.1) translateY(-3%); }
            100% { transform: scale(1); }
        }
        .animate-strike-pop {
            animation: strike-pop 0.16s ease-out;
        }

        /* Starburst graphic popup for visual rhythm reinforcement */
        .visual-rhythm-burst {
            position: absolute;
            top: -2cqw;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8cqw;
            animation: burst-fade 0.35s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            pointer-events: none;
            z-index: 15;
        }
        @keyframes burst-fade {
            0% { opacity: 0; transform: translateX(-50%) scale(0.3) rotate(-15deg); }
            40% { opacity: 1; transform: translateX(-50%) scale(1.4) rotate(10deg); }
            100% { opacity: 0; transform: translateX(-50%) scale(1) rotate(0deg); }
        }

        /* Main Blue Circle Background Base - Acts as size container query context */
        .wheel-base {
            position: relative;
            background-color: #0b41cd;
            border-radius: 50%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            container-type: size;
            
            /* XPRIZE/Engineering: Uses vmin to guarantee a perfect circle that scales responsively */
            width: 100vmin;
            height: 100vmin;
            
            /* Max/Min safety constraints so it never breaks layout boundaries or cuts off */
            max-width: 100%;
            max-height: 100%;
            min-width: 150px;
            min-height: 150px;
            
            /* Layout spacing */
            margin: auto;
            transition: transform 0.3s ease; /* For a soft, magical scale-up on interaction */
        }

        .wheel-base:hover {
            /* Disney tactile magic: subtle pop when the instructor or child interacts */
            transform: scale(1.02); 
        }

        /* Fixed Numbers Grid Layout - Keeps numbers completely static */
        .num-quadrant {
            position: absolute;
            font-size: 16cqw; /* XPRIZE: Locks size proportionally to the container */
            font-weight: bold;
            color: #ffffff;
            width: 50%;
            height: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2; /* Below yellow mask to allow hiding */
            font-family: 'Risque', serif;
        }
        .q1 { top: 0; right: 0; }
        .q2 { bottom: 0; right: 0; }
        .q3 { bottom: 0; left: 0; }
        .q4 { top: 0; left: 0; }

        /* Playful "Clap" Indicator Sparks matching your slide style */
        .clap-text {
            font-size: 5.6cqw; /* Locks bubble size proportionally to the wheel container */
            position: absolute;
            color: #0b41cd;
            font-weight: bold;
            background: #ffffff;
            padding: 0.8cqw 2.4cqw;
            border-radius: 2.4cqw;
            box-shadow: 0 0.8cqw 2cqw rgba(0,0,0,0.1);
            letter-spacing: 0.2cqw;
            display: none !important;
            font-family: 'Risque', serif;
            z-index: 10; /* Above yellow mask */
        }
        
        /* Radiating positions for Clap! bubbles relative to container dimensions */
        .c2_clap { bottom: -3cqw; right: -6cqw; transform: rotate(15deg); }
        .c3_clap { bottom: -3cqw; left: -6cqw; transform: rotate(-15deg); }
        .c4_clap { top: -3cqw; left: -6cqw; transform: rotate(15deg); }

        /* The Moving Yellow Mask Layer - Uses a 90-degree CSS mask clip path */
        .yellow-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffe600;
            border-radius: 50%;
            z-index: 5; /* Above numbers, below claps */
            clip-path: polygon(50% 50%, 50% 0%, 0% 0%, 0% 100%, 100% 100%, 100% 50%); /* Fixed top-right cutout */
            transition: none; /* Metronome-like instant snapping transition */
            transform-origin: 50% 50%;
            transform: rotate(0deg);
        }

        /* Control UI Status Tip */
        .status-tip {
            display: none !important;
        }
    </style>
</head>
<body onclick="advanceStep()">

    <div class="canvas-16-9">
        <!-- Banjo Mascot Vector Drawing Container -->
        <div id="banjoContainer" class="banjo-container">
            <div id="banjoCharacter" class="banjo-character sprite-idle">
                <img src="/assets/svg_stickers/Giraffe.png" alt="Giraffe Mascot" style="width: 100%; height: 100%; object-fit: contain;" />
            </div>
        </div>

        <!-- PC Rhythm Wheel -->
        <div class="wheel-base">
            <div class="num-quadrant q1">1</div>
            <div class="num-quadrant q2">2</div>
            <div class="num-quadrant q3">3</div>
            <div class="num-quadrant q4">4</div>

            <div id="maskLayer" class="yellow-mask"></div>

            <span id="clap2" class="clap-text c2_clap">Clap!</span>
            <span id="clap3" class="clap-text c3_clap">Clap!</span>
            <span id="clap4" class="clap-text c4_clap">Clap!</span>
        </div>

        <div id="tipText" class="status-tip">🖱️ Click Anywhere to Start Rhythm Beat</div>
    </div>

    <script>
        let currentStep = 1;
        let activeTimeout = null;

        const maskLayer = document.getElementById('maskLayer');
        const clap2 = document.getElementById('clap2');
        const clap3 = document.getElementById('clap3');
        const clap4 = document.getElementById('clap4');
        const banjoCharacter = document.getElementById('banjoCharacter');
        const banjoContainer = document.getElementById('banjoContainer');

        function notifyParent(step, isRunning) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({
                    type: 'RHYTHM_UPDATE',
                    currentStep: step,
                    isRunning: isRunning
                }, '*');
            }
        }

        window.addEventListener('load', function() {
            notifyParent(currentStep, false);
        });

        function updateClapVisuals(step) {
            // Instantly toggle the "Clap!" bubble popups based on beat numbers
            clap2.style.display = (step === 2) ? 'block' : 'none';
            clap3.style.display = (step === 3) ? 'block' : 'none';
            clap4.style.display = (step === 4) ? 'block' : 'none';
        }

        function updateMascotState(step) {
            // Remove previous animation classes
            banjoContainer.classList.remove('animate-anticipation', 'animate-strike-pop');
            
            // Remove existing burst element
            const oldBurst = banjoCharacter.querySelector('.visual-rhythm-burst');
            if (oldBurst) oldBurst.remove();

            if (step === 1) {
                banjoCharacter.className = 'banjo-character sprite-listening-ears';
                // Trigger reflow to restart CSS scale/translation animation
                void banjoContainer.offsetWidth;
                banjoContainer.classList.add('animate-anticipation');
            } else if (step === 2 || step === 3 || step === 4) {
                banjoCharacter.className = 'banjo-character sprite-clapping-hands';
                void banjoContainer.offsetWidth;
                banjoContainer.classList.add('animate-strike-pop');

                // Create visual rhythm burst star above character head
                const burst = document.createElement('span');
                burst.className = 'visual-rhythm-burst';
                burst.innerText = '🌟';
                banjoCharacter.appendChild(burst);
            }
        }

        function advanceStep() {
            // Progress step order cleanly clockwise
            currentStep = (currentStep % 4) + 1;
            maskLayer.style.transform = `rotate(${(currentStep - 1) * 90}deg)`;
            updateClapVisuals(currentStep);
            updateMascotState(currentStep);

            // Notify parent that we are running (beat just hit)
            notifyParent(currentStep, true);

            if (activeTimeout) clearTimeout(activeTimeout);
            activeTimeout = setTimeout(() => {
                notifyParent(currentStep, false);
            }, 600);
        }

        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.key === ' ' || e.keyCode === 32) {
                e.preventDefault();
                advanceStep();
            }
        });

        window.addEventListener('message', function(event) {
            if (event.data) {
                if (event.data.type === 'ADVANCE_STEP') {
                    advanceStep();
                } else if (event.data.type === 'SET_STEP') {
                    const step = event.data.step;
                    if (step >= 1 && step <= 4) {
                        currentStep = step;
                        maskLayer.style.transform = `rotate(${(currentStep - 1) * 90}deg)`;
                        updateClapVisuals(currentStep);
                        updateMascotState(currentStep, true);
                    }
                }
            }
        });
    </script>
</body>
</html>
