<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1,2,3,4_click</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #F7EEDD;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .canvas-16-9 {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* SVG Sizing */
        svg {
            max-width: 100%;
            max-height: 100%;
        }

        /* Storyboard Styles */
        .block {
            fill: rgba(255, 255, 255, 0.25);
            stroke: #ffffff;
            stroke-width: 6;
            transition: all 0.25s ease;
        }
        
        .label {
            font-family: Arial, sans-serif;
            font-size: 80px;
            fill: #ffffff;
            text-anchor: middle;
            dominant-baseline: middle;
            font-weight: bold;
        }

        .block-group.glowing .block {
            fill: #FFE600 !important;
            stroke: #FF9900 !important;
            filter: drop-shadow(0 0 15px rgba(255, 230, 0, 0.8));
        }

        /* Drum colors left-to-right */
        .drum-red {
            fill: #FF4D4D;
            stroke: #CC3333;
            stroke-width: 6;
            transition: all 0.2s ease;
        }
        .drum-orange {
            fill: #FFA64D;
            stroke: #CC7A33;
            stroke-width: 6;
            transition: all 0.2s ease;
        }
        .drum-yellow {
            fill: #FFE64D;
            stroke: #CCA333;
            stroke-width: 6;
            transition: all 0.2s ease;
        }
        .drum-blue {
            fill: #4D90FF;
            stroke: #3366CC;
            stroke-width: 6;
            transition: all 0.2s ease;
        }

        /* glowing drum effect */
        .glowing-drum.drum-red { fill: #FF9999 !important; filter: drop-shadow(0 0 15px #FF4D4D); }
        .glowing-drum.drum-orange { fill: #FFE0B3 !important; filter: drop-shadow(0 0 15px #FFA64D); }
        .glowing-drum.drum-yellow { fill: #FFFFB3 !important; filter: drop-shadow(0 0 15px #FFE64D); }
        .glowing-drum.drum-blue { fill: #B3D1FF !important; filter: drop-shadow(0 0 15px #4D90FF); }

        /* Dipping drums animation */
        .drum-group {
            transition: transform 0.15s cubic-bezier(0.25, 0.8, 0.25, 1.1);
        }
        .drum-group.dipped {
            transform: translateY(20px);
        }

        /* Character sliding transition */
        #giraffe {
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        #bear {
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Sprite animation containers */
        #giraffe-character {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: 0px 40px;
        }
        #bear-character {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: 0px 40px;
        }

        /* Bear Reactions */
        #bear-character.bounce-react {
            animation: localBounce 0.4s ease;
        }
        #bear-character.clap-react {
            animation: localClap 0.4s ease;
        }
        #bear-character.sway-react {
            animation: localSway 0.6s ease-in-out;
        }
        #bear-character.hop-react {
            animation: localHop 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Giraffe Animations */
        #giraffe-character.hop-react {
            animation: localHop 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes localBounce {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.92) translateY(8px); }
        }
        @keyframes localClap {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08) translateY(-8px); }
        }
        @keyframes localSway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg) translateX(-12px); }
            75% { transform: rotate(8deg) translateX(12px); }
        }
        @keyframes localHop {
            0%, 100% { transform: translateY(0) scaleY(1); }
            40% { transform: translateY(-50px) scaleY(1.05); }
            70% { transform: translateY(5px) scaleY(0.95); }
        }

        /* Arm movements */
        #giraffe-arm-left {
            transition: transform 0.12s cubic-bezier(0.25, 0.8, 0.25, 1.15);
            transform-origin: 0px 0px;
            transform: rotate(100deg); /* Neutral pointing down */
        }
        #giraffe-arm-right {
            transition: transform 0.12s cubic-bezier(0.25, 0.8, 0.25, 1.15);
            transform-origin: 0px 0px;
            transform: rotate(-100deg); /* Neutral pointing down */
        }

        #bear-arm-left {
            transition: transform 0.12s cubic-bezier(0.25, 0.8, 0.25, 1.15);
            transform-origin: 0px 0px;
            transform: rotate(-100deg); /* Neutral pointing down */
        }
        #bear-arm-right {
            transition: transform 0.12s cubic-bezier(0.25, 0.8, 0.25, 1.15);
            transform-origin: 0px 0px;
            transform: scaleX(-1) rotate(-100deg); /* Neutral pointing down (mirrored) */
        }

        /* Translucent overlay caption bar */
        .story-caption {
            position: absolute;
            bottom: 24px;
            left: 5%;
            right: 5%;
            background: rgba(11, 16, 54, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 24px;
            color: #ffffff;
            font-size: 2.2vh;
            font-weight: 500;
            line-height: 1.4;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 100;
            font-family: Arial, sans-serif;
            transition: all 0.3s ease;
        }

        .status-tip {
            display: none !important;
        }
    </style>
</head>
<body onclick="advanceStep()">

    <div class="canvas-16-9">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="100%" height="100%">
            <!-- Background -->
            <image href="/assets/MF_images/jungle_bg.png" x="0" y="0" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" />

            <!-- Blocks 1–4 -->
            <g id="block1" class="block-group">
                <rect x="250" y="40" width="200" height="200" rx="40" class="block"/>
                <text x="350" y="150" class="label">1</text>
            </g>
            <g id="block2" class="block-group">
                <rect x="550" y="40" width="200" height="200" rx="40" class="block"/>
                <text x="650" y="150" class="label">2</text>
            </g>
            <g id="block3" class="block-group">
                <rect x="850" y="40" width="200" height="200" rx="40" class="block"/>
                <text x="950" y="150" class="label">3</text>
            </g>
            <g id="block4" class="block-group">
                <rect x="1150" y="40" width="200" height="200" rx="40" class="block"/>
                <text x="1250" y="150" class="label">4</text>
            </g>

            <!-- GIRAFFE (left, Banjo) -->
            <g id="giraffe" transform="translate(315,350)">
                <g id="giraffe-character">
                    <!-- High-quality Giraffe Body image -->
                    <image id="giraffe-body-img" href="/assets/svg_stickers/giraffe_body_drum.png" x="-172" y="-350" width="344" height="500"/>

                    <!-- Banjo's Left Arm (for tapping drums 1 & 2) -->
                    <g id="giraffe-arm-left" transform="translate(-65, -180)">
                        <image id="giraffe-arm-left-img" href="/assets/svg_stickers/giraffe_arm_l.png" x="-47" y="-2" width="110" height="290"/>
                    </g>

                    <!-- Banjo's Right Arm (for tapping drums 3 & 4) -->
                    <g id="giraffe-arm-right" transform="translate(65, -180)">
                        <image id="giraffe-arm-right-img" href="/assets/svg_stickers/giraffe_arm_r.png" x="-39" y="-6" width="110" height="290"/>
                    </g>

                    <!-- Label -->
                    <text x="0" y="180" font-size="28" font-weight="900" fill="#fff" text-anchor="middle" font-family="Arial" stroke="#000" stroke-width="2">BANJO</text>
                </g>
            </g>

            <!-- BEAR (right) -->
            <g id="bear" transform="translate(1285,480)">
                <g id="bear-character">
                    <!-- High-quality Bear Body image -->
                    <image id="bear-body-img" href="/assets/svg_stickers/bear_body.png" x="-95" y="-230" width="190" height="380"/>

                    <!-- Bear's Left Arm -->
                    <g id="bear-arm-left" transform="translate(-60, -180)">
                        <image id="bear-arm-left-img" href="/assets/svg_stickers/bear_arm.png" x="-35" y="0" width="70" height="110"/>
                        <!-- Drumstick in left paw -->
                        <rect x="-4" y="95" width="8" height="50" rx="3" fill="#D8A060" stroke="#8B5A2B" stroke-width="2"/>
                        <circle cx="0" cy="148" r="6" fill="#D8A060" stroke="#8B5A2B" stroke-width="2"/>
                    </g>

                    <!-- Bear's Right Arm (mirrored) -->
                    <g id="bear-arm-right" transform="translate(60, -180)">
                        <image id="bear-arm-right-img" href="/assets/svg_stickers/bear_arm.png" x="-35" y="0" width="70" height="110"/>
                        <!-- Drumstick in right paw -->
                        <rect x="-4" y="95" width="8" height="50" rx="3" fill="#D8A060" stroke="#8B5A2B" stroke-width="2"/>
                        <circle cx="0" cy="148" r="6" fill="#D8A060" stroke="#8B5A2B" stroke-width="2"/>
                    </g>

                    <!-- Label -->
                    <text x="0" y="180" font-size="28" font-weight="900" fill="#fff" text-anchor="middle" font-family="Arial" stroke="#000" stroke-width="2">BEAR</text>
                </g>
            </g>

            <!-- Speech Bubbles -->
            <g id="giraffeBubble" opacity="0" transform="translate(315, 100)">
                <rect x="-90" y="-70" width="180" height="60" rx="15" fill="white" stroke="#D89A3A" stroke-width="4"/>
                <polygon points="-12,-12 0,5 12,-12" fill="white" stroke="#D89A3A" stroke-width="4"/>
                <rect x="-14" y="-14" width="28" height="6" fill="white"/>
                <text id="giraffeBubbleText" x="0" y="-40" font-size="26" font-weight="bold" fill="#333" text-anchor="middle" dominant-baseline="middle" font-family="Arial">One</text>
            </g>

            <g id="bearBubble" opacity="0" transform="translate(1285, 220)">
                <rect x="-90" y="-70" width="180" height="60" rx="15" fill="white" stroke="#8B6E4A" stroke-width="4"/>
                <polygon points="-12,-12 0,5 12,-12" fill="white" stroke="#8B6E4A" stroke-width="4"/>
                <rect x="-14" y="-14" width="28" height="6" fill="white"/>
                <text id="bearBubbleText" x="0" y="-40" font-size="26" font-weight="bold" fill="#333" text-anchor="middle" dominant-baseline="middle" font-family="Arial">One!</text>
            </g>

            <!-- Banjo's Drums -->
            <g id="banjoDrum1" class="drum-group">
                <ellipse cx="150" cy="450" rx="75" ry="35" class="drum-red"/>
            </g>
            <g id="banjoDrum2" class="drum-group">
                <ellipse cx="260" cy="450" rx="75" ry="35" class="drum-orange"/>
            </g>
            <g id="banjoDrum3" class="drum-group">
                <ellipse cx="370" cy="450" rx="75" ry="35" class="drum-yellow"/>
            </g>
            <g id="banjoDrum4" class="drum-group">
                <ellipse cx="480" cy="450" rx="75" ry="35" class="drum-blue"/>
            </g>

            <!-- Bear's Drums -->
            <g id="bearDrum1" class="drum-group">
                <ellipse cx="1120" cy="450" rx="75" ry="35" class="drum-red"/>
            </g>
            <g id="bearDrum2" class="drum-group">
                <ellipse cx="1230" cy="450" rx="75" ry="35" class="drum-orange"/>
            </g>
            <g id="bearDrum3" class="drum-group">
                <ellipse cx="1340" cy="450" rx="75" ry="35" class="drum-yellow"/>
            </g>
            <g id="bearDrum4" class="drum-group">
                <ellipse cx="1450" cy="450" rx="75" ry="35" class="drum-blue"/>
            </g>
        </svg>

        <!-- Dynamic Translucent Overlay Story Caption -->
        <div id="story-caption" class="story-caption"></div>
    </div>

    <script>
        let currentStep = 1; // Beat step (1 to 4)
        let storyPhase = 0;  // Story phase (0 to 4)
        let activeTimeout = null;
        let animTimeouts = [];

        function clearAnimTimeouts() {
            animTimeouts.forEach(t => clearTimeout(t));
            animTimeouts = [];
        }

        function notifyParent(step, isRunning) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({
                    type: 'RHYTHM_UPDATE',
                    currentStep: step,
                    isRunning: isRunning
                }, '*');
            }
        }

        function setBearGaze(direction) {}
        function setGiraffeGaze(direction) {}

        function updateVisuals() {
            clearAnimTimeouts();

            // 1. Clear all glowing blocks and dipped drums
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`block${i}`).classList.remove('glowing');
                
                const banjoDrum = document.getElementById(`banjoDrum${i}`);
                if (banjoDrum) {
                    banjoDrum.classList.remove('dipped');
                    const ellipse = banjoDrum.querySelector('ellipse');
                    if (ellipse) ellipse.classList.remove('glowing-drum');
                }
                const bearDrum = document.getElementById(`bearDrum${i}`);
                if (bearDrum) {
                    bearDrum.classList.remove('dipped');
                    const ellipse = bearDrum.querySelector('ellipse');
                    if (ellipse) ellipse.classList.remove('glowing-drum');
                }
            }

            // 2. Hide speech bubbles
            const gBubble = document.getElementById('giraffeBubble');
            const bBubble = document.getElementById('bearBubble');
            const gBubbleText = document.getElementById('giraffeBubbleText');
            const bBubbleText = document.getElementById('bearBubbleText');
            
            gBubble.style.opacity = '0';
            bBubble.style.opacity = '0';

            // 3. Reset character sprite animations
            const giraffeChar = document.getElementById('giraffe-character');
            const bearChar = document.getElementById('bear-character');
            giraffeChar.className = '';
            bearChar.className = '';

            const gArmLeft = document.getElementById('giraffe-arm-left');
            const gArmRight = document.getElementById('giraffe-arm-right');
            const bArmLeft = document.getElementById('bear-arm-left');
            const bArmRight = document.getElementById('bear-arm-right');

            gArmLeft.style.transform = '';
            gArmRight.style.transform = '';
            bArmLeft.style.transform = '';
            bArmRight.style.transform = '';

            const caption = document.getElementById('story-caption');

            // 4. State updates based on story phase
            if (storyPhase === 0) { // Intro
                document.getElementById('giraffe').setAttribute('transform', 'translate(315, 350)');
                document.getElementById('bear').setAttribute('transform', 'translate(1285, 480)');
                
                setGiraffeGaze('straight');
                setBearGaze('left');

                caption.innerHTML = "<strong>Banjo (Giraffe)</strong> starts the moment with calm energy. He sets the emotional tone: <em>'We’re going to count together.'</em>";
            }
            else if (storyPhase === 1) { // Banjo's Demonstration
                document.getElementById('giraffe').setAttribute('transform', 'translate(315, 350)');
                document.getElementById('bear').setAttribute('transform', 'translate(1285, 480)');

                setBearGaze('left');
                setGiraffeGaze('down');

                const isLeft = (currentStep === 1 || currentStep === 2);
                const activeArm = isLeft ? gArmLeft : gArmRight;

                // Start raising arm
                activeArm.style.transform = 'rotate(0deg)';

                // Tap animation timing
                animTimeouts.push(setTimeout(() => {
                    if (currentStep === 1) activeArm.style.transform = 'rotate(20deg)';
                    else if (currentStep === 2) activeArm.style.transform = 'rotate(40deg)';
                    else if (currentStep === 3) activeArm.style.transform = 'rotate(-40deg)';
                    else if (currentStep === 4) activeArm.style.transform = 'rotate(-20deg)';
                }, 180));

                animTimeouts.push(setTimeout(() => {
                    // Strike moment: Drum dips and Block glows
                    const banjoDrum = document.getElementById(`banjoDrum${currentStep}`);
                    if (banjoDrum) {
                        banjoDrum.classList.add('dipped');
                        const ellipse = banjoDrum.querySelector('ellipse');
                        if (ellipse) ellipse.classList.add('glowing-drum');
                    }
                    document.getElementById(`block${currentStep}`).classList.add('glowing');

                    // Speech
                    const counts = ["One", "Two", "Three", "Four"];
                    gBubbleText.textContent = counts[currentStep - 1];
                    gBubble.style.opacity = '1';

                    // Bear reaction
                    const reactions = ['bounce-react', 'clap-react', 'sway-react', 'hop-react'];
                    const reactionTexts = ['small bounce', 'single clap', 'side sway', 'happy hop'];
                    bearChar.classList.add(reactions[currentStep - 1]);

                    caption.innerHTML = `<strong>Banjo</strong> raises his hoof and taps Drum ${currentStep} — <em>"${counts[currentStep - 1]}"</em>. Bear responds with a ${reactionTexts[currentStep - 1]}!`;
                }, 300));

                // Reset arm
                animTimeouts.push(setTimeout(() => {
                    activeArm.style.transform = '';
                }, 600));
            }
            else if (storyPhase === 2) { // Bear's Imitation
                document.getElementById('giraffe').setAttribute('transform', 'translate(315, 350)');
                document.getElementById('bear').setAttribute('transform', 'translate(1285, 480)');

                setGiraffeGaze('right');
                setBearGaze('down');

                const isLeft = (currentStep === 1 || currentStep === 2);
                const activeArm = isLeft ? bArmLeft : bArmRight;

                // Slower raise for toddler hesitation
                animTimeouts.push(setTimeout(() => {
                    activeArm.style.transform = isLeft ? 'rotate(0deg)' : 'scaleX(-1) rotate(0deg)';
                }, 100));

                // Strike timing
                animTimeouts.push(setTimeout(() => {
                    if (currentStep === 1) activeArm.style.transform = 'rotate(-30deg)';
                    else if (currentStep === 2) activeArm.style.transform = 'rotate(-50deg)';
                    else if (currentStep === 3) activeArm.style.transform = 'scaleX(-1) rotate(-50deg)';
                    else if (currentStep === 4) activeArm.style.transform = 'scaleX(-1) rotate(-30deg)';
                }, 550));

                animTimeouts.push(setTimeout(() => {
                    // Strike moment: Drum dips and Block glows
                    const bearDrum = document.getElementById(`bearDrum${currentStep}`);
                    if (bearDrum) {
                        bearDrum.classList.add('dipped');
                        const ellipse = bearDrum.querySelector('ellipse');
                        if (ellipse) ellipse.classList.add('glowing-drum');
                    }
                    document.getElementById(`block${currentStep}`).classList.add('glowing');

                    // Speech
                    const counts = ["One!", "Two!", "Three!", "Four!"];
                    bBubbleText.textContent = counts[currentStep - 1];
                    bBubble.style.opacity = '1';

                    caption.innerHTML = `<strong>Bear</strong> hesitates, then taps Drum ${currentStep} — <em>"${counts[currentStep - 1]}"</em>. Banjo watches proudly!`;
                }, 700));

                // Reset arm
                animTimeouts.push(setTimeout(() => {
                    activeArm.style.transform = '';
                }, 1000));
            }
            else if (storyPhase === 3) { // Celebration
                document.getElementById('giraffe').setAttribute('transform', 'translate(315, 350)');
                document.getElementById('bear').setAttribute('transform', 'translate(1285, 480)');

                setGiraffeGaze('right');
                setBearGaze('left');

                giraffeChar.classList.add('hop-react');
                bearChar.classList.add('clap-react');

                gBubbleText.textContent = "Yay!";
                bBubbleText.textContent = "Yay!";
                gBubble.style.opacity = '1';
                bBubble.style.opacity = '1';

                caption.innerHTML = "<strong>Banjo</strong> waves his drumsticks and hops. <strong>Bear</strong> claps and beams! <em>'Yay, we did it!'</em>";
            }
            else if (storyPhase === 4) { // Repeat together in sync
                document.getElementById('giraffe').setAttribute('transform', 'translate(315, 350)');
                document.getElementById('bear').setAttribute('transform', 'translate(1285, 480)');

                setGiraffeGaze('down');
                setBearGaze('down');

                const isLeft = (currentStep === 1 || currentStep === 2);
                const gActiveArm = isLeft ? gArmLeft : gArmRight;
                const bActiveArm = isLeft ? bArmLeft : bArmRight;

                gActiveArm.style.transform = 'rotate(0deg)';
                bActiveArm.style.transform = isLeft ? 'rotate(0deg)' : 'scaleX(-1) rotate(0deg)';

                // Tap animation timing
                animTimeouts.push(setTimeout(() => {
                    if (currentStep === 1) gActiveArm.style.transform = 'rotate(20deg)';
                    else if (currentStep === 2) gActiveArm.style.transform = 'rotate(40deg)';
                    else if (currentStep === 3) gActiveArm.style.transform = 'rotate(-40deg)';
                    else if (currentStep === 4) gActiveArm.style.transform = 'rotate(-20deg)';

                    if (currentStep === 1) bActiveArm.style.transform = 'rotate(-30deg)';
                    else if (currentStep === 2) bActiveArm.style.transform = 'rotate(-50deg)';
                    else if (currentStep === 3) bActiveArm.style.transform = 'scaleX(-1) rotate(-50deg)';
                    else if (currentStep === 4) bActiveArm.style.transform = 'scaleX(-1) rotate(-30deg)';
                }, 180));

                animTimeouts.push(setTimeout(() => {
                    // Strike moment
                    const banjoDrum = document.getElementById(`banjoDrum${currentStep}`);
                    if (banjoDrum) {
                        banjoDrum.classList.add('dipped');
                        const ellipse = banjoDrum.querySelector('ellipse');
                        if (ellipse) ellipse.classList.add('glowing-drum');
                    }
                    const bearDrum = document.getElementById(`bearDrum${currentStep}`);
                    if (bearDrum) {
                        bearDrum.classList.add('dipped');
                        const ellipse = bearDrum.querySelector('ellipse');
                        if (ellipse) ellipse.classList.add('glowing-drum');
                    }
                    document.getElementById(`block${currentStep}`).classList.add('glowing');

                    const gCounts = ["One", "Two", "Three", "Four"];
                    const bCounts = ["One!", "Two!", "Three!", "Four!"];
                    gBubbleText.textContent = gCounts[currentStep - 1];
                    bBubbleText.textContent = bCounts[currentStep - 1];
                    gBubble.style.opacity = '1';
                    bBubble.style.opacity = '1';

                    caption.innerHTML = `They tap Drum ${currentStep} together in sync — <em>"${gCounts[currentStep - 1]}"</em> and <em>"${bCounts[currentStep - 1]}"</em>!`;
                }, 300));

                // Reset arms
                animTimeouts.push(setTimeout(() => {
                    gActiveArm.style.transform = '';
                    bActiveArm.style.transform = '';
                }, 600));
            }
        }

        function advanceStep(fromParent = false) {
            if (storyPhase === 0) {
                storyPhase = 1;
                currentStep = 1;
            } else if (storyPhase === 3) {
                storyPhase = 4;
                currentStep = 1;
            } else {
                currentStep = (currentStep % 4) + 1;
                if (currentStep === 1) {
                    if (storyPhase === 1) storyPhase = 2;
                    else if (storyPhase === 2) storyPhase = 3;
                    else if (storyPhase === 4) storyPhase = 0;
                }
            }

            updateVisuals();

            if (!fromParent) {
                notifyParent(currentStep, true);
                if (activeTimeout) clearTimeout(activeTimeout);
                activeTimeout = setTimeout(() => {
                    notifyParent(currentStep, false);
                }, 600);
            }
        }

        window.addEventListener('load', () => {
            updateVisuals();
            notifyParent(currentStep, false);
        });

        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.key === ' ' || e.keyCode === 32) {
                e.preventDefault();
                advanceStep();
            }
        });

        window.addEventListener('message', function(event) {
            if (event.data) {
                if (event.data.type === 'ADVANCE_STEP') {
                    advanceStep();
                } else if (event.data.type === 'SET_STEP') {
                    const step = event.data.step;
                    if (step >= 1 && step <= 4) {
                        if (step !== currentStep) {
                            advanceStep(true);
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
