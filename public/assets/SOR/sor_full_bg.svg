<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1280" viewBox="0 0 1920 1280" preserveAspectRatio="none">

  <!-- Brushed red background with warm top lighting -->
  <defs>
    <linearGradient id="brushedRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b30000"/>
      <stop offset="40%" stop-color="#990000"/>
      <stop offset="100%" stop-color="#660000"/>
    </linearGradient>

    <!-- Soft warm light wash from top -->
    <linearGradient id="topLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,220,180,0.55)"/>
      <stop offset="25%" stop-color="rgba(255,220,180,0.15)"/>
      <stop offset="60%" stop-color="rgba(255,220,180,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,220,180,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1280" fill="url(#brushedRed)" />

  <!-- Light wash overlay -->
  <rect width="1920" height="1280" fill="url(#topLight)" />

  <!-- SCHOOL OF ROCK Banner -->
  <g transform="translate(0, 80)">
    <text x="50%" y="0" text-anchor="middle" font-size="180" font-weight="900" fill="white" font-family="Arial Black, sans-serif">
      SCHOOL of ROCK
    </text>

    <!-- Separator line -->
    <line x1="710" y1="40" x2="1210" y2="40" stroke="white" stroke-width="6"/>

    <!-- ALPHARETTA -->
    <text x="50%" y="120" text-anchor="middle" font-size="90" font-weight="700" fill="white" font-family="Arial Black, sans-serif">
      ALPHARETTA
    </text>
  </g>

</svg>
