<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="80%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#141c18" />
      <stop offset="100%" stop-color="#050806" />
    </radialGradient>

    <!-- Spotlight Cone Gradients -->
    <linearGradient id="beamLeft" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4" />
      <stop offset="30%" stop-color="#22c55e" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="beamRight" x1="100%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4" />
      <stop offset="30%" stop-color="#22c55e" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
    </linearGradient>

    <!-- Light Source Glows -->
    <radialGradient id="glowLeft" cx="0%" cy="0%" r="20%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="100%" cy="0%" r="20%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
    </radialGradient>

    <!-- Stage Floor Light Glow -->
    <radialGradient id="floorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Stage Floor Glow -->
  <ellipse cx="200" cy="360" rx="120" ry="35" fill="url(#floorGlow)" />

  <!-- Spotlight Cones -->
  <!-- Left Cone -->
  <polygon points="0,0 60,0 280,380 120,380" fill="url(#beamLeft)" />
  <!-- Right Cone -->
  <polygon points="400,0 340,0 120,380 280,380" fill="url(#beamRight)" />

  <!-- Light Sources -->
  <circle cx="0" cy="0" r="80" fill="url(#glowLeft)" />
  <circle cx="400" cy="0" r="80" fill="url(#glowRight)" />

  <!-- Subtle Dashed Stage Border Outline (Matches classroom theme) -->
  <rect x="0" y="0" width="100%" height="100%" fill="none" stroke="rgba(34, 197, 94, 0.2)" stroke-width="2" stroke-dasharray="8 6" />
</svg>
