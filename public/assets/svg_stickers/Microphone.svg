<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Gradients -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#b0b5bc" />
      <stop offset="100%" stop-color="#6e747c" />
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d3238" />
      <stop offset="50%" stop-color="#15181b" />
      <stop offset="100%" stop-color="#0a0b0d" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe875" />
      <stop offset="100%" stop-color="#f5af19" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Glow / Shadow -->
  <circle cx="32" cy="22" r="14" fill="#6e747c" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Stand / Base support -->
  <path d="M26,50 L38,50 M32,44 L32,50" stroke="url(#metalGrad)" stroke-width="4" stroke-linecap="round" />
  
  <!-- Mic U-shaped Mount -->
  <path d="M20,24 A12,12 0 0,0 44,24" fill="none" stroke="url(#metalGrad)" stroke-width="3" stroke-linecap="round" />
  
  <!-- Mic Handle/Body -->
  <rect x="27" y="26" width="10" height="20" rx="3" fill="url(#handleGrad)" stroke="#15181b" stroke-width="1"/>
  
  <!-- Gold Ring -->
  <rect x="26" y="24" width="12" height="3" rx="1.5" fill="url(#goldGrad)" />
  
  <!-- Mic Grille Head -->
  <rect x="25" y="10" width="14" height="15" rx="7" fill="url(#metalGrad)" stroke="#ffffff" stroke-width="1" />
  <!-- Grille lines -->
  <path d="M27,10 L27,25 M32,10 L32,25 M37,10 L37,25 M25,14 L39,14 M25,19 L39,19" fill="none" stroke="#484f56" stroke-width="0.8" opacity="0.7"/>
</svg>
