<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <!-- Animated confetti with slow, smooth falling motion and loops -->
  <g id="animatedConfetti">
    <!-- Falling red (slowed to 4s) -->
    <circle cx="100" cy="-15" r="4" fill="#ff0000">
      <animateMotion dur="4s" repeatCount="indefinite" path="M0,0 Q50,150 0,430" />
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="4s" repeatCount="indefinite" />
    </circle>

    <!-- Falling yellow (slowed to 4.5s) -->
    <circle cx="200" cy="-15" r="4" fill="#ffeb3b">
      <animateMotion dur="4.5s" repeatCount="indefinite" path="M0,0 Q-30,180 0,430" />
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="4.5s" repeatCount="indefinite" />
    </circle>

    <!-- Falling blue (slowed to 5s) -->
    <circle cx="300" cy="-15" r="4" fill="#1e90ff">
      <animateMotion dur="5s" repeatCount="indefinite" path="M0,0 Q40,200 0,430" />
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="5s" repeatCount="indefinite" />
    </circle>

    <!-- Falling pink (slowed to 4.2s) -->
    <circle cx="400" cy="-15" r="4" fill="#ff69b4">
      <animateMotion dur="4.2s" repeatCount="indefinite" path="M0,0 Q-40,160 0,430" />
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="4.2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>